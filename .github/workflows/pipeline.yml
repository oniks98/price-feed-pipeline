name: Product Import Pipeline

# ─────────────────────────────────────────────────────────────
# РОЗКЛАД: 5 разів на день по Києву
#   Зима EET  (UTC+2): листопад–березень → UTC = Kyiv - 2
#   Літо EEST (UTC+3): квітень–жовтень  → UTC = Kyiv - 3
#
#   Kyiv  │ Зима (UTC+2) │ Літо (UTC+3)
#   04:00 │   02:00 UTC  │  01:00 UTC
#   09:00 │   07:00 UTC  │  06:00 UTC
#   12:30 │   10:30 UTC  │  09:30 UTC
#   16:30 │   14:30 UTC  │  13:30 UTC
#   20:00 │   18:00 UTC  │  17:00 UTC
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    # 04:00 Kyiv — літо (UTC+3, квітень–жовтень)
    - cron: "0 1 * 4-10 *"
    # 04:00 Kyiv — зима (UTC+2, листопад–березень)
    - cron: "0 2 * 11-12 *"
    - cron: "0 2 * 1-3 *"

    # 09:00 Kyiv — літо
    - cron: "0 6 * 4-10 *"
    # 09:00 Kyiv — зима
    - cron: "0 7 * 11-12 *"
    - cron: "0 7 * 1-3 *"

    # 12:30 Kyiv — літо
    - cron: "30 9 * 4-10 *"
    # 12:30 Kyiv — зима
    - cron: "30 10 * 11-12 *"
    - cron: "30 10 * 1-3 *"

    # 16:30 Kyiv — літо
    - cron: "30 13 * 4-10 *"
    # 16:30 Kyiv — зима
    - cron: "30 14 * 11-12 *"
    - cron: "30 14 * 1-3 *"

    # 20:00 Kyiv — літо
    - cron: "0 17 * 4-10 *"
    # 20:00 Kyiv — зима
    - cron: "0 18 * 11-12 *"
    - cron: "0 18 * 1-3 *"

  workflow_dispatch:

# Якщо новий run стартує поки старий ще йде — старий скасовується.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  FAILED_SUPPLIERS: "" # Оголошено тут для линтера; динамічно перезаписується через $GITHUB_ENV

# ─────────────────────────────────────────────────────────────
# АРХІТЕКТУРА ГІЛОК:
#   main        — код + конфіги (sku_map.json, keywords, mapping rules)
#   data-latest — великі авто-генеровані файли (один commit, amend кожен run):
#                   data/{supplier}/{supplier}_old.csv  ← baseline для diff
#                   data/{supplier}/import_products.csv ← дельта для Прому
#                   data/merged.csv + merged_prev.csv
#                   data/prom_import_status.json        ← статус останнього імпорту
#                   data/markets/{kasta,epicenter,rozetka}_feed.xml + _prev.xml
#
# ДОДАВАННЯ НОВОГО ПОСТАЧАЛЬНИКА:
#   1. Додай блок в SUPPLIER_CONFIG у scripts/update_products.py
#   2. Додай spider у матрицю нижче (jobs.scrape.strategy.matrix.include)
#   3. Додай supplier в список циклів у "Restore *_old.csv" і "Push to data-latest"
#   Більше нічого в цьому файлі міняти не потрібно.
# ─────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════
  # STAGE 1 — SCRAPE (паралельно)
  # ═══════════════════════════════════════════════════════════
  scrape:
    name: Spider — ${{ matrix.supplier }}
    runs-on: ubuntu-latest
    timeout-minutes: 175

    strategy:
      fail-fast: false
      matrix:
        include:
          - supplier: viatec
            spider: viatec_dealer
            timeout_minutes: 120
            max_attempts: 2
            retry_wait: 30

          - supplier: secur
            spider: secur_feed
            timeout_minutes: 35
            max_attempts: 2
            retry_wait: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ matrix.timeout_minutes }}
          max_attempts: ${{ matrix.max_attempts }}
          retry_wait_seconds: ${{ matrix.retry_wait }}
          command: python scripts/ultra_clean_run.py ${{ matrix.spider }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          VIATEC_EMAIL: ${{ secrets.VIATEC_EMAIL }}
          VIATEC_PASSWORD: ${{ secrets.VIATEC_PASSWORD }}
          # secur_feed використовує тільки HTTP-фіди — Playwright не потрібен

      - name: Upload CSV + sku_map artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraped-${{ matrix.supplier }}
          path: |
            data/output/${{ matrix.supplier }}_new.csv
            data/output/${{ matrix.supplier }}_status.txt
            data/${{ matrix.supplier }}/sku_map.json
          retention-days: 1
          if-no-files-found: warn
          compression-level: 6

  # ═══════════════════════════════════════════════════════════
  # STAGE 2 — PROCESS & PUBLISH
  # ═══════════════════════════════════════════════════════════
  process-and-publish:
    name: Process & Publish
    runs-on: ubuntu-latest
    needs: scrape
    if: needs.scrape.result != 'cancelled'

    permissions:
      contents: write

    steps:
      - name: Checkout main (код + sku_map.json)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Клонуємо data-latest щоб отримати *_old.csv для скриптів.
      # publish-dir залишається для подальшого push назад в data-latest.
      - name: Restore *_old.csv from data-latest
        run: |
          BOT_NAME="github-actions[bot]"
          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin data-latest; then
            git clone --branch data-latest --single-branch \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              publish-dir
            echo "✅ data-latest клоновано"
          else
            echo "⚠️  Гілка data-latest не існує — створюємо порожню"
            mkdir -p publish-dir
            cd publish-dir
            git init
            git config user.name  "${BOT_NAME}"
            git config user.email "${BOT_EMAIL}"
            git remote add origin \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b data-latest
            git commit --allow-empty -m "chore: init data-latest branch"
            git push origin data-latest
            cd ..
          fi

          for supplier in viatec secur; do
            mkdir -p data/${supplier}
            src="publish-dir/data/${supplier}/${supplier}_old.csv"
            if [ -f "${src}" ]; then
              cp "${src}" "data/${supplier}/${supplier}_old.csv"
              echo "✅ Відновлено ${supplier}_old.csv"
            else
              echo "⚠️  ${supplier}_old.csv не знайдено в data-latest (перший запуск?)"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download scraped artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scraped-*
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Verify downloaded files
        run: |
          echo "=== Файли в data/output/ ==="
          ls -la data/output/ || echo "Директорія порожня"
          echo "=== sku_map файли ==="
          find data/ -name "sku_map.json" -exec ls -la {} \; 2>/dev/null || echo "sku_map файлів не знайдено"

      - name: Read spider statuses and set env flags
        run: |
          FAILED_SUPPLIERS=""
          for SUPPLIER in viatec secur; do
            STATUS_FILE="data/output/${SUPPLIER}_status.txt"
            if [ -f "$STATUS_FILE" ] && [ "$(cat $STATUS_FILE)" = "success" ]; then
              echo "${SUPPLIER^^}_OK=true" >> $GITHUB_ENV
              echo "✅ ${SUPPLIER}: success"
            else
              echo "${SUPPLIER^^}_OK=false" >> $GITHUB_ENV
              echo "❌ ${SUPPLIER}: failure (status file missing or not success)"
              FAILED_SUPPLIERS="${FAILED_SUPPLIERS} ${SUPPLIER}"
            fi
          done
          echo "FAILED_SUPPLIERS=${FAILED_SUPPLIERS}" >> $GITHUB_ENV

      - name: Run update_products — all suppliers
        run: python scripts/update_products.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Merge CSVs
        run: python scripts/merge_csv.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      # Перевіряємо статус попереднього імпорту Prom.
      # Якщо попередній run завершився з failed — об'єднуємо merged_prev.csv
      # з новим merged.csv щоб Prom отримав повну актуальну картину.
      - name: Merge pending Prom data (retry logic)
        run: python scripts/merge_pending.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      # Пушимо всі великі файли в data-latest через --amend.
      # prom_import_status.json також потрапляє в amend через `git add .`
      - name: Push large files to data-latest (amend)
        run: |
          BOT_NAME="github-actions[bot]"
          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"

          cd publish-dir
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"
          cd ..

          [ -f publish-dir/data/merged.csv ] && \
            cp publish-dir/data/merged.csv publish-dir/data/merged_prev.csv

          cp data/merged.csv publish-dir/data/merged.csv

          for supplier in viatec secur; do
            mkdir -p publish-dir/data/${supplier}
            [ -f data/${supplier}/${supplier}_old.csv ] && \
              cp data/${supplier}/${supplier}_old.csv \
                 publish-dir/data/${supplier}/${supplier}_old.csv
            [ -f data/${supplier}/import_products.csv ] && \
              cp data/${supplier}/import_products.csv \
                 publish-dir/data/${supplier}/import_products.csv
          done

          cd publish-dir
          git add .
          if git diff --staged --quiet; then
            echo "✅ Змін немає — коміт пропущено"
          else
            git commit --amend --no-edit \
              --author="${BOT_NAME} <${BOT_EMAIL}>"
            git push origin data-latest --force
            echo "✅ data-latest оновлено"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit sku_map.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "data/*/sku_map.json"

          if git diff --staged --quiet; then
            echo "✅ Змін немає — коміт пропущено"
          else
            git commit -m "chore: sku_map update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git fetch origin main
            git rebase origin/main -X ours || git rebase --abort
            git push origin HEAD:main --force-with-lease
            echo "✅ Запушено в main"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Тригер записує результат (success/failed) в data/prom_import_status.json.
      # Файл потрапляє в data-latest через amend наступного run.
      - name: Trigger Prom API import
        run: python scripts/prom_api_trigger.py
        env:
          PROM_API_TOKEN: ${{ secrets.PROM_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_ROOT: ${{ github.workspace }}
          PROM_MERGED_CSV_URL: "https://raw.githubusercontent.com/${{ github.repository }}/data-latest/data/merged.csv"

      # Пушимо prom_import_status.json після тригера (він ще не в amend цього run).
      # Використовуємо окремий amend щоб не чіпати основні файли.
      - name: Push prom_import_status to data-latest
        if: always()
        run: |
          BOT_NAME="github-actions[bot]"
          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"

          STATUS_SRC="${{ github.workspace }}/data/prom_import_status.json"
          STATUS_DST="publish-dir/data/prom_import_status.json"

          if [ ! -f "${STATUS_SRC}" ]; then
            echo "⚠️  prom_import_status.json не знайдено — пропускаємо"
            exit 0
          fi

          cp "${STATUS_SRC}" "${STATUS_DST}"

          cd publish-dir
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"
          git add data/prom_import_status.json
          if git diff --staged --quiet; then
            echo "✅ prom_import_status.json не змінився — коміт пропущено"
          else
            git commit --amend --no-edit \
              --author="${BOT_NAME} <${BOT_EMAIL}>"
            git push origin data-latest --force
            echo "✅ prom_import_status.json запушено в data-latest"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Prom import URL
        run: |
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "🔗 URL для імпорту в Промі:"
          echo "   https://raw.githubusercontent.com/${{ github.repository }}/data-latest/data/merged.csv"
          echo ""
          echo "📋 Вставити в: Імпорт товарів → Завантажити файл з сервера"
          echo "════════════════════════════════════════════════════"

      - name: Fail if any spider failed
        if: env.FAILED_SUPPLIERS != ''
        run: |
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "⚠️  ПАУКИ З ПОМИЛКОЮ: ${{ env.FAILED_SUPPLIERS }}"
          echo "   Дані цих постачальників не оновлено."
          echo "   Інші постачальники оброблені і запушені в data-latest успішно."
          echo "════════════════════════════════════════════════════"
          exit 1

  # ═══════════════════════════════════════════════════════════
  # STAGE 3 — NOINDEX AUTOMATION
  # ═══════════════════════════════════════════════════════════
  noindex:
    name: Prom Noindex Automation
    runs-on: ubuntu-latest
    needs: process-and-publish
    if: |
      contains(fromJSON('["success","failure"]'), needs.process-and-publish.result)
    timeout-minutes: 65
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Wait for Prom import to complete
        run: |
          echo "⏳ Пауза 15 хвилин — чекаємо завершення імпорту в Промі..."
          sleep 900
          echo "✅ Пауза завершена, запускаємо noindex"

      - name: Run noindex automation
        run: python scripts/prom_noindex_automation.py
        env:
          PROM_COOKIES: ${{ secrets.PROM_COOKIES }}
          PROM_HEADLESS: "true"
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload noindex logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noindex-logs-${{ github.run_number }}
          path: |
            prom_noindex.log
            error_*.png
            prom_noindex_fatal_hrefs.json
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 6

  # ═══════════════════════════════════════════════════════════
  # STAGE 3.5 — PROSALE AUTOMATION
  # ═══════════════════════════════════════════════════════════
  prosale:
    name: Prom ProSale Automation
    runs-on: ubuntu-latest
    needs: noindex
    if: needs.noindex.result == 'success' || needs.noindex.result == 'failure'
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run ProSale automation
        run: python scripts/prom_prosale_automation.py
        env:
          PROM_COOKIES: ${{ secrets.PROM_COOKIES }}
          PROM_HEADLESS: "true"
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload ProSale logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prosale-logs-${{ github.run_number }}
          path: prom_prosale.log
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 6

  # ═══════════════════════════════════════════════════════════
  # STAGE 4 — KASTA FEED
  # ═══════════════════════════════════════════════════════════
  kasta-feed:
    name: Generate Kasta Feed
    runs-on: ubuntu-latest
    needs: process-and-publish
    if: |
      contains(fromJSON('["success","failure"]'), needs.process-and-publish.result)
    timeout-minutes: 35
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Prom import to complete
        run: |
          echo "⏳ Пауза 15 хвилин — чекаємо завершення імпорту в Промі..."
          sleep 900
          echo "✅ Пауза завершена, генеруємо фід"

      - name: Generate Kasta feed
        run: python scripts/generate_kasta_feed.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload kasta feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-kasta
          path: data/markets/kasta_feed.xml
          retention-days: 1
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════
  # STAGE 5 — EPICENTER FEED
  # ═══════════════════════════════════════════════════════════
  epicenter-feed:
    name: Generate Epicenter Feed
    runs-on: ubuntu-latest
    needs: process-and-publish
    if: |
      contains(fromJSON('["success","failure"]'), needs.process-and-publish.result)
    timeout-minutes: 35
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Prom import to complete
        run: |
          echo "⏳ Пауза 15 хвилин — чекаємо завершення імпорту в Промі..."
          sleep 900
          echo "✅ Пауза завершена, генеруємо фід"

      - name: Generate Epicenter feed
        run: python scripts/generate_epicenter_feed.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload epicenter feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-epicenter
          path: data/markets/epicenter_feed.xml
          retention-days: 1
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════
  # STAGE 6 — ROZETKA FEED
  # ═══════════════════════════════════════════════════════════
  rozetka-feed:
    name: Generate Rozetka Feed
    runs-on: ubuntu-latest
    needs: process-and-publish
    if: |
      contains(fromJSON('["success","failure"]'), needs.process-and-publish.result)
    timeout-minutes: 35
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Prom import to complete
        run: |
          echo "⏳ Пауза 15 хвилин — чекаємо завершення імпорту в Промі..."
          sleep 900
          echo "✅ Пауза завершена, генеруємо фід"

      - name: Generate Rozetka feed
        run: python scripts/generate_rozetka_feed.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload rozetka feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-rozetka
          path: data/markets/rozetka_feed.xml
          retention-days: 1
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════
  # STAGE 7 — PUBLISH FEEDS
  # ═══════════════════════════════════════════════════════════
  publish-feeds:
    name: Publish Feeds to data-latest
    runs-on: ubuntu-latest
    needs: [kasta-feed, epicenter-feed, rozetka-feed]
    if: |
      contains(fromJSON('["success","failure"]'), needs.kasta-feed.result) &&
      contains(fromJSON('["success","failure"]'), needs.epicenter-feed.result) &&
      contains(fromJSON('["success","failure"]'), needs.rozetka-feed.result)

    permissions:
      contents: write

    steps:
      - name: Download all feed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: feed-*
          path: feeds/
          merge-multiple: true
        continue-on-error: true

      - name: Clone data-latest
        run: |
          git clone --branch data-latest --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            publish-dir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy feeds and rotate _prev
        run: |
          mkdir -p publish-dir/data/markets

          for market in kasta epicenter rozetka; do
            src="feeds/${market}_feed.xml"
            dst="publish-dir/data/markets/${market}_feed.xml"
            prev="publish-dir/data/markets/${market}_feed_prev.xml"

            if [ -f "${src}" ]; then
              [ -f "${dst}" ] && cp "${dst}" "${prev}"
              cp "${src}" "${dst}"
              echo "✅ ${market}_feed.xml оновлено"
            else
              echo "⚠️  ${market}_feed.xml відсутній — пропускаємо"
            fi
          done

      - name: Push to data-latest (один amend)
        run: |
          BOT_NAME="github-actions[bot]"
          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"

          cd publish-dir
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"
          git add data/markets/
          if git diff --staged --quiet; then
            echo "✅ Фіди не змінились — коміт пропущено"
          else
            git commit --amend --no-edit \
              --author="${BOT_NAME} <${BOT_EMAIL}>"
            git push origin data-latest --force
            echo "✅ Всі фіди запушено"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print feed URLs
        run: |
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "🔗 Kasta:     https://raw.githubusercontent.com/${{ github.repository }}/data-latest/data/markets/kasta_feed.xml"
          echo "🔗 Epicenter: https://raw.githubusercontent.com/${{ github.repository }}/data-latest/data/markets/epicenter_feed.xml"
          echo "🔗 Rozetka:   https://raw.githubusercontent.com/${{ github.repository }}/data-latest/data/markets/rozetka_feed.xml"
          echo "════════════════════════════════════════════════════"
